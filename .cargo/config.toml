# CPU 特定优化配置

# macOS 优化
[target.x86_64-apple-darwin]
rustflags = [
    "-C", "target-cpu=native",
    "-C", "link-arg=-fuse-ld=lld",
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "target-cpu=native",
]

# Linux 优化
[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=x86-64-v3",
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-fuse-ld=lld",
]
